        <circle cx="0" cy="0" r="60" fill="#3498DB" opacity="0.6"/><path d="M-30,-10 Q0,-30 30,-10" stroke="#ECF0F1" stroke-width="3" fill="none"/><path d="M-20,10 Q0,-5 20,10" stroke="#ECF0F1" stroke-width="3" fill="none"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
