<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#2C3E50"/>
    
    <!-- Pattern -->
    
            <path d="M0,200 Q150,150 300,200 T600,200" stroke="#3498DB" stroke-width="2" fill="none" opacity="0.2"/>
            <path d="M0,250 Q150,200 300,250 T600,250" stroke="#3498DB" stroke-width="2" fill="none" opacity="0.15"/>
            <path d="M0,300 Q150,250 300,300 T600,300" stroke="#3498DB" stroke-width="2" fill="none" opacity="0.1"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_calma-en-la-tormenta" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:0.95" />
