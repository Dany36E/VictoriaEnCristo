<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#8E44AD"/>
    
    <!-- Pattern -->
    
            <line x1="300" y1="0" x2="300" y2="900" stroke="#E74C3C" stroke-width="80" opacity="0.05"/>
            <line x1="150" y1="0" x2="150" y2="900" stroke="#E74C3C" stroke-width="40" opacity="0.08"/>
            <line x1="450" y1="0" x2="450" y2="900" stroke="#E74C3C" stroke-width="40" opacity="0.08"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_cortar-el-impulso" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_cortar-el-impulso)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <rect x="-40" y="-10" width="80" height="20" fill="#F1C40F" opacity="0.8"/><rect x="-50" y="-5" width="30" height="10" fill="#E74C3C" transform="rotate(-20)"/><rect x="20" y="-5" width="30" height="10" fill="#E74C3C" transform="rotate(20)"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#F1C40F" text-anchor="middle" opacity="0.9">
        Cortar el Impulso
    </text>
    
</svg>