<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#F39C12"/>
    
    <!-- Pattern -->
    
            <circle cx="50" cy="50" r="100" fill="#34495E" opacity="0.1"/>
            <circle cx="350" cy="200" r="120" fill="#34495E" opacity="0.08"/>
            <circle cx="150" cy="400" r="80" fill="#34495E" opacity="0.12"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_mente-blindada" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#F39C12;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#F39C12;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_mente-blindada)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <circle cx="0" cy="0" r="50" fill="#34495E" opacity="0.7"/><path d="M-20,-20 Q0,-35 20,-20 L20,20 Q0,35 -20,20 Z" fill="#F39C12" opacity="0.8"/><circle cx="0" cy="-5" r="15" fill="#ECF0F1" opacity="0.9"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#ECF0F1" text-anchor="middle" opacity="0.9">
        Mente Blindada
    </text>
    
</svg>