<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#16A085"/>
    
    <!-- Pattern -->
    
            <path d="M0,200 Q150,150 300,200 T600,200" stroke="#2C3E50" stroke-width="2" fill="none" opacity="0.2"/>
            <path d="M0,250 Q150,200 300,250 T600,250" stroke="#2C3E50" stroke-width="2" fill="none" opacity="0.15"/>
            <path d="M0,300 Q150,250 300,300 T600,300" stroke="#2C3E50" stroke-width="2" fill="none" opacity="0.1"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_mente-en-tierra-firme" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#16A085;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#16A085;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_mente-en-tierra-firme)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <rect x="-40" y="-5" width="80" height="50" rx="5" fill="#16A085" opacity="0.6"/><rect x="-30" y="-20" width="60" height="15" rx="3" fill="#ECF0F1" opacity="0.8"/><circle cx="0" cy="-12" r="3" fill="#2C3E50"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#ECF0F1" text-anchor="middle" opacity="0.9">
        Mente en Tierra Firm
    </text>
    <text x="300" y="690" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ECF0F1" text-anchor="middle" opacity="0.9">e</text>
</svg>