    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#F39C12" text-anchor="middle" opacity="0.9">
        Mundo Digital: Regla
    </text>
    <text x="300" y="690" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F39C12" text-anchor="middle" opacity="0.9"> de Vida</text>
