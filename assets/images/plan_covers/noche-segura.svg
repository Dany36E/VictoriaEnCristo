<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#34495E"/>
    
    <!-- Pattern -->
    
            <circle cx="50" cy="50" r="100" fill="#F39C12" opacity="0.1"/>
            <circle cx="350" cy="200" r="120" fill="#F39C12" opacity="0.08"/>
            <circle cx="150" cy="400" r="80" fill="#F39C12" opacity="0.12"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_noche-segura" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#34495E;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#34495E;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_noche-segura)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <circle cx="20" cy="-20" r="30" fill="#F39C12" opacity="0.7"/><path d="M-15,-35 Q-5,-25 5,-35" stroke="#ECF0F1" stroke-width="2" fill="none"/><rect x="-25" y="10" width="50" height="30" rx="5" fill="#ECF0F1" opacity="0.3"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#ECF0F1" text-anchor="middle" opacity="0.9">
        Noche Segura
    </text>
    
</svg>