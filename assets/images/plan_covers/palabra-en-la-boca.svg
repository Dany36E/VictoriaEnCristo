<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#F39C12"/>
    
    <!-- Pattern -->
    
            <line x1="300" y1="0" x2="300" y2="900" stroke="#3498DB" stroke-width="80" opacity="0.05"/>
            <line x1="150" y1="0" x2="150" y2="900" stroke="#3498DB" stroke-width="40" opacity="0.08"/>
            <line x1="450" y1="0" x2="450" y2="900" stroke="#3498DB" stroke-width="40" opacity="0.08"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_palabra-en-la-boca" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#F39C12;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#F39C12;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_palabra-en-la-boca)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <circle cx="0" cy="0" r="30" fill="#ECF0F1" opacity="0.7"/><path d="M-15,5 Q0,-5 15,5" stroke="#3498DB" stroke-width="3" fill="none"/><text x="0" y="-10" font-size="20" fill="#F39C12" text-anchor="middle" font-weight="bold">"</text>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#ECF0F1" text-anchor="middle" opacity="0.9">
        Palabra en la Boca
    </text>
    
</svg>