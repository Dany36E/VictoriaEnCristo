        <path d="M0,-40 Q-20,-20 -10,10 Q0,0 10,10 Q20,-20 0,-40 Z" fill="#3498DB" opacity="0.7"/><circle cx="0" cy="-10" r="8" fill="#ECF0F1"/><path d="M-5,20 Q0,35 5,20" stroke="#27AE60" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
