<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#ECF0F1"/>
    
    <!-- Pattern -->
    
            <line x1="300" y1="0" x2="300" y2="900" stroke="#3498DB" stroke-width="80" opacity="0.05"/>
            <line x1="150" y1="0" x2="150" y2="900" stroke="#3498DB" stroke-width="40" opacity="0.08"/>
            <line x1="450" y1="0" x2="450" y2="900" stroke="#3498DB" stroke-width="40" opacity="0.08"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_pureza-con-proposito" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ECF0F1;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#ECF0F1;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_pureza-con-proposito)"/>
    
    <!-- Icon -->
