    <!-- Pattern -->
    
            <rect x="0" y="0" width="200" height="300" fill="#27AE60" opacity="0.03"/>
            <rect x="200" y="300" width="200" height="300" fill="#27AE60" opacity="0.05"/>
            <rect x="400" y="0" width="200" height="300" fill="#27AE60" opacity="0.04"/>
        
    
    <!-- Gradient overlay -->
