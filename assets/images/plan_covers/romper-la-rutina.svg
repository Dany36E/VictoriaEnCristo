<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#E74C3C"/>
    
    <!-- Pattern -->
    
            <path d="M0,200 Q150,150 300,200 T600,200" stroke="#F39C12" stroke-width="2" fill="none" opacity="0.2"/>
            <path d="M0,250 Q150,200 300,250 T600,250" stroke="#F39C12" stroke-width="2" fill="none" opacity="0.15"/>
            <path d="M0,300 Q150,250 300,300 T600,300" stroke="#F39C12" stroke-width="2" fill="none" opacity="0.1"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_romper-la-rutina" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_romper-la-rutina)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <circle cx="0" cy="0" r="45" stroke="#E74C3C" stroke-width="3" fill="none" opacity="0.7" stroke-dasharray="10,5"/><path d="M30,0 L50,0 L60,10" stroke="#27AE60" stroke-width="4" fill="none"/><circle cx="60" cy="10" r="5" fill="#F39C12"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#27AE60" text-anchor="middle" opacity="0.9">
