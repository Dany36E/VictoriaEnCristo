<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#3498DB"/>
    
    <!-- Pattern -->
    
            <circle cx="50" cy="50" r="100" fill="#ECF0F1" opacity="0.1"/>
            <circle cx="350" cy="200" r="120" fill="#ECF0F1" opacity="0.08"/>
            <circle cx="150" cy="400" r="80" fill="#ECF0F1" opacity="0.12"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_silencio-interior" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_silencio-interior)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <circle cx="0" cy="0" r="50" fill="#ECF0F1" opacity="0.3"/><circle cx="0" cy="0" r="35" fill="#3498DB" opacity="0.4"/><circle cx="0" cy="0" r="20" fill="#ECF0F1" opacity="0.6"/><circle cx="0" cy="0" r="5" fill="#3498DB"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#95A5A6" text-anchor="middle" opacity="0.9">
        Silencio Interior
    </text>
    
</svg>