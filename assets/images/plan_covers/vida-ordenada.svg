<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="600" height="900" fill="#3498DB"/>
    
    <!-- Pattern -->
    
            <rect x="0" y="0" width="200" height="300" fill="#F39C12" opacity="0.03"/>
            <rect x="200" y="300" width="200" height="300" fill="#F39C12" opacity="0.05"/>
            <rect x="400" y="0" width="200" height="300" fill="#F39C12" opacity="0.04"/>
        
    
    <!-- Gradient overlay -->
    <defs>
        <linearGradient id="grad_vida-ordenada" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0.95" />
        </linearGradient>
    </defs>
    <rect width="600" height="900" fill="url(#grad_vida-ordenada)"/>
    
    <!-- Icon -->
    <g transform="translate(300, 350)">
        <rect x="-40" y="-35" width="35" height="25" fill="#3498DB" opacity="0.5"/><rect x="-40" y="-5" width="35" height="25" fill="#F39C12" opacity="0.5"/><rect x="-40" y="25" width="35" height="25" fill="#27AE60" opacity="0.5"/><rect x="5" y="-35" width="35" height="25" fill="#3498DB" opacity="0.5"/><rect x="5" y="-5" width="35" height="25" fill="#F39C12" opacity="0.5"/>
    </g>
    
    <!-- Title -->
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
          fill="#27AE60" text-anchor="middle" opacity="0.9">
        Vida Ordenada
    </text>
    
</svg>