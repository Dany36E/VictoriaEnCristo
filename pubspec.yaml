name: app_quitar
description: "Victoria en Cristo - App cristiana para superar tentaciones y vicios"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.2.0  # For Callable Cloud Functions (deleteUserData)
  google_sign_in: ^6.2.2
  # Premium UI Dependencies
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0     # Elegant particles
  # Share as Image Dependencies
  share_plus: ^10.1.4  # Native share functionality
  path_provider: ^2.1.5 # File system access
  # Text-to-Speech
  flutter_tts: ^4.2.0   # Native TTS functionality
  # Image Caching
  cached_network_image: ^3.3.1  # Efficient network image caching
  # Audio System
  just_audio: ^0.9.43  # BGM - más robusto que audioplayers para Android moderno
  audio_session: ^0.1.25  # Configuración de audio session
  # Local Notifications
  flutter_local_notifications: ^17.2.4  # Push notifications
  timezone: ^0.9.4  # Timezone support for scheduled notifications
  # Home Screen Widgets
  home_widget: ^0.7.0  # Android AppWidget + iOS WidgetKit integration
  # Bible Reader
  xml: ^6.5.0  # XML parsing for Bible files
  flutter_colorpicker: ^1.1.0  # Custom highlight color picker

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/sounds/
    - assets/sounds/sfx/
    - assets/content/
    - assets/images/
    - assets/images/plan_covers/
    - assets/bible/
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
