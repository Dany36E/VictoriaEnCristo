name: app_quitar
description: "Victoria en Cristo - App cristiana para superar tentaciones y vicios"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.2.0  # For Callable Cloud Functions (deleteUserData)
  firebase_crashlytics: ^4.3.2  # Crash reporting
  firebase_analytics: ^11.4.2   # Usage analytics
  google_sign_in: ^6.2.2
  # Premium UI Dependencies
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0     # Elegant particles
  # Share as Image Dependencies
  share_plus: ^10.1.4  # Native share functionality
  path_provider: ^2.1.5 # File system access
  # Text-to-Speech
  flutter_tts: ^4.2.0   # Native TTS functionality
  # Image Caching
  cached_network_image: ^3.3.1  # Efficient network image caching
  # Audio System
  just_audio: ^0.9.43  # BGM - más robusto que audioplayers para Android moderno
  audio_session: ^0.1.25  # Configuración de audio session
  # Local Notifications
  flutter_local_notifications: ^17.2.4  # Push notifications
  timezone: ^0.9.4  # Timezone support for scheduled notifications
  # Firebase Cloud Messaging (push cross-device para Compañero de Batalla)
  firebase_messaging: ^15.1.5
  # QR Codes (compartir código de invitación visualmente)
  qr_flutter: ^4.1.0
  # Home Screen Widgets
  home_widget: ^0.7.0  # Android AppWidget + iOS WidgetKit integration
  # Bible Reader
  xml: ^6.5.0  # XML parsing for Bible files
  url_launcher: ^6.2.5  # Open external links (Enduring Word attribution)
  flutter_colorpicker: ^1.1.0  # Custom highlight color picker
  # Blue Letter Bible API integration
  flutter_secure_storage: ^9.2.4  # Secure API key storage
  http: ^1.2.2  # HTTP client for BLB API
  # Bible Maps (interactive ESRI topo tiles)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  dio: ^5.7.0             # For cached tile downloads
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_file_store: ^1.2.3
  # Connectivity monitoring
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/sounds/
    - assets/sounds/sfx/
    - assets/content/
    - assets/images/
    - assets/images/plan_covers/
    - assets/images/headbanz/
    - assets/bible/
    - assets/bible/interlinear/greek/
    - assets/bible/interlinear/hebrew/
    - assets/bible/red_letter/
    - assets/bible/dictionary/
    - assets/bible/commentaries/matthew_henry/
    - assets/bible/commentaries/jfb/
    - assets/bible/commentaries/gill/
    - assets/bible/commentaries/clarke/
    - assets/bible/commentaries/guzik/
    - assets/bible/timeline/
    - assets/bible/cross_refs/
    - assets/bible/maps/
    - assets/bible/maps/images/
    - assets/bible/books_intro/
    - assets/bible/harmony/
    - assets/bible/typology/
    - assets/bible/quotes/
    - assets/bible/search/
    - assets/bible/share_backgrounds/
    - assets/bible/share/
    - assets/widget/jesus/
    - assets/widget/backgrounds/
    - assets/config.json
    # Fuentes bundled (descubiertas por google_fonts y disponibles como
    # fontFamily nativo para fallback offline sin descargas en runtime).
    - google_fonts/
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Fuentes nativas (fallback offline cuando google_fonts no pueda resolver la
  # variable y runtime fetching está desactivado).
  fonts:
    - family: Manrope
      fonts:
        - asset: google_fonts/Manrope-VariableFont_wght.ttf
    - family: Cinzel
      fonts:
        - asset: google_fonts/Cinzel-VariableFont_wght.ttf
    - family: Lora
      fonts:
        - asset: google_fonts/Lora-VariableFont_wght.ttf
        - asset: google_fonts/Lora-Italic-VariableFont_wght.ttf
          style: italic
    - family: CrimsonPro
      fonts:
        - asset: google_fonts/CrimsonPro-VariableFont_wght.ttf
        - asset: google_fonts/CrimsonPro-Italic-VariableFont_wght.ttf
          style: italic
    - family: Lato
      fonts:
        - asset: google_fonts/Lato-Regular.ttf
        - asset: google_fonts/Lato-Bold.ttf
          weight: 700
        - asset: google_fonts/Lato-Italic.ttf
          style: italic
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
